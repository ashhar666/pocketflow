version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pocketflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres_secure_pass@db:5432/pocketflow
      - SECRET_KEY=django-insecure-docker-secret-replace-me
      - DEBUG=True
      - ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
